[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B"]
ignore = ["E501", "E402", "S105", "S108", "S110", "B905"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S603"]  # assert/subprocess は pytest で許可

[tool.pyright]
typeCheckingMode = "basic"
pythonVersion = "3.10"
venvPath = "."
venv = ".venv-win"
extraPaths = ["src"]
include = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["test_*.py"]
addopts = "-v"
filterwarnings = [
    "ignore:.*EventLoopPolicy.*:DeprecationWarning",
]

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
show_missing = true
