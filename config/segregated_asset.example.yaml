# config/segregated_asset.example.yaml
#
# 分別管理資産・借入控除 定義ファイルのサンプル。
# このファイルをコピーして config/segregated_asset.yaml を作成し、実データに書き換える。
# 実ファイルは .gitignore 対象 (個人金融データ)。
#
# スキーマ:
#   segregated  - MF が直接捕捉できない資産。total / クラス別は変えず、
#                 report の「分別管理資産」参考値に加算する。
#   debt        - 短期借入 (証券担保ローン等)。total と該当クラスから減算する。
#
# period: [開始日 YYYY-MM-DD, 終了日 YYYY-MM-DD | "unlimited"]
#   - 開始日に "unlimited" は指定不可。
#   - クォートなし (2023-01-01) でも可 (PyYAML が date 型として受け付ける)。
#   - start > end は起動時エラー。
# amount: 整数 (円)。負の値も可 (e.g. 仮払い分を差し引く場合)。
# note:   任意。str のみ可。監査トレイル用途推奨。
# asset_class: 下記いずれか
#   生活費 / 現金 / 待機資金 / 投資信託 / 株式（長期） / 株式（短期）
#   債券 / FX / 先物・オプション / その他の資産

# =============================================================================
# 分別管理資産 (旧 PJ period_dict 相当)
# MF が捕捉できない資産を加算し report に参考表示。
# total / クラス別金額は変えない。
# =============================================================================
segregated:
  - period: ["2023-01-01", "unlimited"]
    asset_class: "待機資金"
    amount: 1000000
    note: "例: ゆうちょ銀行定期 (MF 未連携)"

  - period: ["2023-06-01", "2024-03-31"]
    asset_class: "株式（長期）"
    amount: 500000
    note: "例: 保有株式 期間限定補正"

  - period: ["2022-12-01", "unlimited"]
    asset_class: "待機資金"
    amount: -300000
    note: "例: 税金仮払い分 (負値で差し引き)"

# =============================================================================
# 借入控除 (旧 PJ period_dict_debt 相当)
# 短期借入を total と該当クラスから減算する。
# =============================================================================
debt:
  - period: ["2024-03-01", "2024-03-31"]
    asset_class: "待機資金"
    amount: 2000000
    note: "例: 証券担保ローン短期"
