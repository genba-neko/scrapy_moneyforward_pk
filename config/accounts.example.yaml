# config/accounts.yaml — site x account login credentials for crawl_runner.
#
# Copy this file to config/accounts.yaml and fill in real credentials.
# The real file is gitignored. Site keys must match registry.py VARIANTS.
#
# Each site can hold zero or more accounts. Sites omitted from this file are
# automatically skipped by the orchestrator. The crawl_runner iterates
# (site x account x spider_type) sequentially.

mf:
  - user: primary@example.com
    pass: replace-me-1
  - user: secondary@example.com
    pass: replace-me-2

xmf_ssnb:
  - user: ssnb-account@example.com
    pass: replace-me-3

# xmf_mizuho:    # account なし → orchestrator は skip
#   - user: ...
#     pass: ...

# xmf_jabank:
#   - user: ...
#     pass: ...

# Other registered sites: xmf, xmf_smtb, xmf_linkx, xmf_okashin,
# xmf_shiga, xmf_shiz. See src/moneyforward_pk/spiders/variants/registry.py.
